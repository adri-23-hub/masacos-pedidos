<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Masacos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #f97316, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid #334155;
    }

    .card h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: #f1f5f9;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 0.375rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #f97316;
    }

    .masacos-grid {
      display: grid;
      gap: 0.75rem;
    }

    .masaco-input {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .masaco-input .badge {
      background: #f97316;
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .btn {
      width: 100%;
      padding: 0.875rem;
      background: linear-gradient(135deg, #f97316, #f59e0b);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .orders-table {
      width: 100%;
      border-collapse: collapse;
    }

    .orders-table th,
    .orders-table td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid #334155;
    }

    .orders-table th {
      color: #94a3b8;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .orders-table td {
      font-size: 0.9375rem;
    }

    .orders-table tr:last-child td {
      border-bottom: none;
    }

    .masaco-tag {
      display: inline-block;
      background: #334155;
      padding: 0.25rem 0.625rem;
      border-radius: 9999px;
      font-size: 0.8125rem;
      margin: 0.125rem;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 0.8125rem;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .delete-btn:hover {
      background: rgba(239, 68, 68, 0.15);
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #64748b;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #22c55e;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 500;
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: #334155;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      flex: 1;
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f97316;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
    }

    @media (max-width: 640px) {
      .orders-table th:nth-child(2),
      .orders-table td:nth-child(2) {
        display: none;
      }

      .stats {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Registro de Masacos</h1>
    <p class="subtitle">Cada persona debe entregar 3 masacos</p>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="totalPeople">0</div>
        <div class="stat-label">Personas</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="totalMasacos">0</div>
        <div class="stat-label">Masacos total</div>
      </div>
    </div>

    <div class="card">
      <h2>Nuevo Pedido</h2>
      <form id="orderForm">
        <div class="form-group">
          <label for="name">Nombre</label>
          <input type="text" id="name" placeholder="Nombre de la persona" required autocomplete="off">
        </div>
        <div class="form-group">
          <label>Masacos (3 obligatorios)</label>
          <div class="masacos-grid">
            <div class="masaco-input">
              <span class="badge">1</span>
              <input type="text" id="masaco1" placeholder="Masaco 1" required autocomplete="off">
            </div>
            <div class="masaco-input">
              <span class="badge">2</span>
              <input type="text" id="masaco2" placeholder="Masaco 2" required autocomplete="off">
            </div>
            <div class="masaco-input">
              <span class="badge">3</span>
              <input type="text" id="masaco3" placeholder="Masaco 3" required autocomplete="off">
            </div>
          </div>
        </div>
        <button type="submit" class="btn">Registrar Pedido</button>
      </form>
    </div>

    <div class="card">
      <h2>Pedidos Registrados</h2>
      <div id="ordersContainer">
        <div class="empty-state">No hay pedidos registrados todavia</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">Pedido registrado correctamente!</div>

  <script>
    const STORAGE_KEY = 'masaco_orders';

    function getOrders() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    function saveOrders(orders) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(orders));
    }

    function updateStats() {
      const orders = getOrders();
      document.getElementById('totalPeople').textContent = orders.length;
      document.getElementById('totalMasacos').textContent = orders.length * 3;
    }

    function renderOrders() {
      const orders = getOrders();
      const container = document.getElementById('ordersContainer');

      if (orders.length === 0) {
        container.innerHTML = '<div class="empty-state">No hay pedidos registrados todavia</div>';
        return;
      }

      let html = `
        <table class="orders-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Nombre</th>
              <th>Masacos</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
      `;

      orders.forEach((order, index) => {
        html += `
          <tr>
            <td>${index + 1}</td>
            <td>${escapeHtml(order.name)}</td>
            <td>
              ${order.masacos.map(m => `<span class="masaco-tag">${escapeHtml(m)}</span>`).join('')}
            </td>
            <td>
              <button class="delete-btn" onclick="deleteOrder(${index})">Eliminar</button>
            </td>
          </tr>
        `;
      });

      html += '</tbody></table>';
      container.innerHTML = html;
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function deleteOrder(index) {
      if (confirm('Eliminar este pedido?')) {
        const orders = getOrders();
        orders.splice(index, 1);
        saveOrders(orders);
        renderOrders();
        updateStats();
      }
    }

    document.getElementById('orderForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const m1 = document.getElementById('masaco1').value.trim();
      const m2 = document.getElementById('masaco2').value.trim();
      const m3 = document.getElementById('masaco3').value.trim();

      if (!name || !m1 || !m2 || !m3) {
        showToast('Completa todos los campos');
        return;
      }

      const orders = getOrders();
      orders.push({
        name: name,
        masacos: [m1, m2, m3]
      });
      saveOrders(orders);

      this.reset();
      document.getElementById('name').focus();
      renderOrders();
      updateStats();
      showToast('Pedido registrado correctamente!');
    });

    renderOrders();
    updateStats();
  </script>
</body>
</html>
