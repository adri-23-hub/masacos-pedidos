<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro de Masacos</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      font-size: 2rem;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #f97316, #f59e0b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 1.5rem;
      margin-bottom: 2rem;
      border: 1px solid #334155;
    }

    .card h2 {
      font-size: 1.25rem;
      margin-bottom: 1rem;
      color: #f1f5f9;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    label {
      display: block;
      font-size: 0.875rem;
      color: #94a3b8;
      margin-bottom: 0.375rem;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 1rem;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #f97316;
    }

    .masacos-grid {
      display: grid;
      gap: 0.75rem;
    }

    .masaco-input {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .masaco-input .badge {
      background: #f97316;
      color: white;
      font-size: 0.75rem;
      font-weight: 600;
      width: 24px;
      height: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .btn {
      width: 100%;
      padding: 0.875rem;
      background: linear-gradient(135deg, #f97316, #f59e0b);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: #334155;
      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      flex: 1;
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: #f97316;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #94a3b8;
      text-transform: uppercase;
    }

    .person-card {
      background: #0f172a;
      border-radius: 8px;
      padding: 1rem;
      margin-bottom: 0.75rem;
      border: 1px solid #334155;
    }

    .person-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .person-name {
      font-weight: 600;
      font-size: 1.0625rem;
      color: #f1f5f9;
    }

    .person-progress {
      font-size: 0.875rem;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      font-weight: 600;
    }

    .progress-0 {
      background: rgba(239, 68, 68, 0.2);
      color: #ef4444;
    }

    .progress-1, .progress-2 {
      background: rgba(250, 204, 21, 0.2);
      color: #facc15;
    }

    .progress-3 {
      background: rgba(34, 197, 94, 0.2);
      color: #22c55e;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #334155;
      border-radius: 9999px;
      margin-bottom: 0.75rem;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #f97316, #f59e0b);
      border-radius: 9999px;
      transition: width 0.3s ease;
    }

    .progress-bar-fill.complete {
      background: #22c55e;
    }

    .masaco-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .masaco-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.75rem;
      background: #1e293b;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .masaco-item:hover {
      background: #334155;
    }

    .masaco-item.delivered {
      opacity: 0.6;
    }

    .masaco-item.delivered .masaco-item-name {
      text-decoration: line-through;
      color: #94a3b8;
    }

    .masaco-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #64748b;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
      cursor: pointer;
    }

    .masaco-item.delivered .masaco-checkbox {
      background: #22c55e;
      border-color: #22c55e;
    }

    .masaco-item.delivered .masaco-checkbox::after {
      content: '✓';
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .masaco-item-name {
      font-size: 0.9375rem;
      color: #e2e8f0;
    }

    .masaco-item-number {
      background: #475569;
      color: white;
      font-size: 0.6875rem;
      font-weight: 600;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .person-actions {
      display: flex;
      justify-content: flex-end;
      margin-top: 0.5rem;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #ef4444;
      cursor: pointer;
      font-size: 0.8125rem;
      padding: 0.375rem 0.75rem;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .delete-btn:hover {
      background: rgba(239, 68, 68, 0.15);
    }

    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #64748b;
    }

    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #22c55e;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      font-weight: 500;
      opacity: 0;
      transition: transform 0.3s ease, opacity 0.3s ease;
      z-index: 999;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    .toast.undo {
      background: #f97316;
    }

    @media (max-width: 640px) {
      .stats {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Registro de Masacos</h1>
    <p class="subtitle">Cada persona debe entregar 3 masacos</p>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="totalPeople">0</div>
        <div class="stat-label">Personas</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="totalDelivered">0</div>
        <div class="stat-label">Entregados</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="totalPending">0</div>
        <div class="stat-label">Pendientes</div>
      </div>
    </div>

    <div class="card">
      <h2>Registrar Persona</h2>
      <form id="personForm">
        <div class="form-group">
          <label for="name">Nombre</label>
          <input type="text" id="name" placeholder="Nombre de la persona" required autocomplete="off">
        </div>
        <div class="form-group">
          <label>Masacos a entregar</label>
          <div class="masacos-grid">
            <div class="masaco-input">
              <span class="badge">1</span>
              <input type="text" id="masaco1" placeholder="Masaco 1" required autocomplete="off">
            </div>
            <div class="masaco-input">
              <span class="badge">2</span>
              <input type="text" id="masaco2" placeholder="Masaco 2" required autocomplete="off">
            </div>
            <div class="masaco-input">
              <span class="badge">3</span>
              <input type="text" id="masaco3" placeholder="Masaco 3" required autocomplete="off">
            </div>
          </div>
        </div>
        <button type="submit" class="btn">Registrar</button>
      </form>
    </div>

    <div class="card">
      <h2>Pizarra de Entregas</h2>
      <div id="boardContainer">
        <div class="empty-state">No hay personas registradas todavia</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
    import { getDatabase, ref, onValue, push, update, remove } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_PROYECTO.firebaseapp.com",
      databaseURL: "https://TU_PROYECTO-default-rtdb.firebaseio.com",
      projectId: "TU_PROYECTO",
      storageBucket: "TU_PROYECTO.appspot.com",
      messagingSenderId: "TU_SENDER_ID",
      appId: "TU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = 'toast show';
      setTimeout(() => toast.classList.remove('show'), 2500);
    }

    function toggleMasaco(personKey, masacoIndex, currentDelivered) {
      const masacoRef = ref(db, `people/${personKey}/masacos/${masacoIndex}/delivered`);
      update(ref(db, `people/${personKey}/masacos/${masacoIndex}`), {
        delivered: !currentDelivered
      });
    }
    window.toggleMasaco = toggleMasaco;

    function deletePerson(personKey) {
      if (confirm('Eliminar esta persona y todos sus masacos?')) {
        remove(ref(db, `people/${personKey}`));
        showToast('Persona eliminada');
      }
    }
    window.deletePerson = deletePerson;

    function updateStats(data) {
      const people = Object.values(data || {});
      const totalPeople = people.length;
      let delivered = 0;
      people.forEach(p => {
        if (p.masacos) {
          p.masacos.forEach(m => {
            if (m.delivered) delivered++;
          });
        }
      });
      const pending = (totalPeople * 3) - delivered;

      document.getElementById('totalPeople').textContent = totalPeople;
      document.getElementById('totalDelivered').textContent = delivered;
      document.getElementById('totalPending').textContent = pending;
    }

    function renderBoard(data) {
      const container = document.getElementById('boardContainer');
      const people = data ? Object.entries(data) : [];

      if (people.length === 0) {
        container.innerHTML = '<div class="empty-state">No hay personas registradas todavia</div>';
        updateStats({});
        return;
      }

      const peopleObj = {};
      people.forEach(([key, person]) => { peopleObj[key] = person; });
      updateStats(peopleObj);

      let html = '';
      people.forEach(([personKey, person]) => {
        const masacos = person.masacos || [];
        const deliveredCount = masacos.filter(m => m.delivered).length;
        const progressClass = `progress-${deliveredCount}`;
        const isComplete = deliveredCount === 3;
        const barWidth = (deliveredCount / 3) * 100;

        html += `
          <div class="person-card">
            <div class="person-header">
              <span class="person-name">${escapeHtml(person.name)}</span>
              <span class="person-progress ${progressClass}">${deliveredCount}/3</span>
            </div>
            <div class="progress-bar">
              <div class="progress-bar-fill ${isComplete ? 'complete' : ''}" style="width: ${barWidth}%"></div>
            </div>
            <div class="masaco-list">
        `;

        masacos.forEach((masaco, masacoIndex) => {
          html += `
            <div class="masaco-item ${masaco.delivered ? 'delivered' : ''}" onclick="toggleMasaco('${personKey}', ${masacoIndex}, ${masaco.delivered})">
              <span class="masaco-item-number">${masacoIndex + 1}</span>
              <div class="masaco-checkbox"></div>
              <span class="masaco-item-name">${escapeHtml(masaco.name)}</span>
            </div>
          `;
        });

        html += `
            </div>
            <div class="person-actions">
              <button class="delete-btn" onclick="deletePerson('${personKey}')">Eliminar persona</button>
            </div>
          </div>
        `;
      });

      container.innerHTML = html;
    }

    const peopleRef = ref(db, 'people');
    onValue(peopleRef, (snapshot) => {
      renderBoard(snapshot.val());
    });

    document.getElementById('personForm').addEventListener('submit', function(e) {
      e.preventDefault();

      const name = document.getElementById('name').value.trim();
      const m1 = document.getElementById('masaco1').value.trim();
      const m2 = document.getElementById('masaco2').value.trim();
      const m3 = document.getElementById('masaco3').value.trim();

      if (!name || !m1 || !m2 || !m3) {
        showToast('Completa todos los campos');
        return;
      }

      push(ref(db, 'people'), {
        name: name,
        masacos: [
          { name: m1, delivered: false },
          { name: m2, delivered: false },
          { name: m3, delivered: false }
        ]
      });

      this.reset();
      document.getElementById('name').focus();
      showToast(`${name} registrado con 3 masacos`);
    });
  </script>
</body>
</html>
